<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFF Cascade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── AREAS ────────────────────────────────────────────────────────────────
    const AREAS = ['🌿 Life and Living', '🏦 Business & Professional Life'];

    // ── STATUS CONFIG ────────────────────────────────────────────────────────
    const NS = {
      'Confirmed':    { bg: 'bg-emerald-50', border: 'border-emerald-400', badge: 'bg-emerald-100 text-emerald-700', dot: 'bg-emerald-500' },
      'Needs Review': { bg: 'bg-amber-50',   border: 'border-amber-400',   badge: 'bg-amber-100 text-amber-700',   dot: 'bg-amber-400'   },
      'Gap Detected': { bg: 'bg-red-50',     border: 'border-red-400',     badge: 'bg-red-100 text-red-700',       dot: 'bg-red-500'     },
    };
    const nsCfg = s => NS[s] || NS['Needs Review'];

    const RESULT_STATUS = {
      'Done':         'bg-emerald-100 text-emerald-700',
      'In Progress':  'bg-blue-100 text-blue-700',
      'At All Times': 'bg-purple-100 text-purple-700',
      'To Do':        'bg-gray-100 text-gray-500',
    };

    // ── SHARED ATOMS ─────────────────────────────────────────────────────────
    function NSBadge({ status }) {
      const c = nsCfg(status);
      return (
        <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold whitespace-nowrap ${c.badge}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />
          {status}
        </span>
      );
    }

    function StatusPill({ status }) {
      return (
        <span className={`text-xs font-medium px-2 py-0.5 rounded-full whitespace-nowrap ${RESULT_STATUS[status] || RESULT_STATUS['To Do']}`}>
          {status}
        </span>
      );
    }

    function SectionHeader({ color, title, count }) {
      return (
        <div className="flex items-center gap-2 mb-3">
          <div className={`w-2 h-6 ${color} rounded-full`} />
          <h2 className="text-lg font-bold text-gray-900">{title}</h2>
          <span className="text-sm text-gray-400">({count})</span>
        </div>
      );
    }

    function EvalPrompt({ label, onConfirm, onGap, onCancel, saving }) {
      return (
        <div className="bg-white rounded-lg border border-gray-200 shadow-sm p-3 mt-2">
          <p className="text-sm text-gray-600 italic mb-3">"{label}"</p>
          <div className="flex flex-wrap gap-2">
            <button onClick={onConfirm} disabled={saving}
              className="text-sm bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-3 py-1.5 rounded-lg font-medium transition-colors disabled:opacity-50">
              {saving ? 'Saving…' : '✓ Yes — N&S Confirmed'}
            </button>
            <button onClick={onGap} disabled={saving}
              className="text-sm bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg font-medium transition-colors disabled:opacity-50">
              ✗ No — Gap Detected
            </button>
            <button onClick={onCancel} disabled={saving}
              className="text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg transition-colors">
              Cancel
            </button>
          </div>
        </div>
      );
    }

    // ── HIERARCHY VIEW ────────────────────────────────────────────────────────
    function HResult({ result }) {
      return (
        <div className="flex items-start gap-2 py-1.5 px-2 rounded hover:bg-white/70 transition-colors">
          <span className="text-gray-300 text-xs mt-0.5 flex-shrink-0">▸</span>
          <span className="text-sm text-gray-700 flex-1 leading-snug">{result.text}</span>
          <StatusPill status={result.status} />
        </div>
      );
    }

    function HOutcome({ outcome, allResults, onUpdate }) {
      const [showEval, setShowEval] = useState(false);
      const [saving, setSaving] = useState(false);
      const c = nsCfg(outcome.nsStatus);
      const myResults = allResults.filter(r => r.outcomeId === outcome.id);

      const save = async (status) => {
        setSaving(true); setShowEval(false);
        await onUpdate('outcome', outcome.id, status);
        setSaving(false);
      };

      return (
        <div className={`rounded-lg border-l-4 ${c.border} ${c.bg} p-3 mb-2`}>
          <div className="flex items-start gap-2 mb-2">
            <span className="text-xs font-bold text-gray-400 uppercase tracking-wide mt-0.5 flex-shrink-0 w-14">Outcome</span>
            <p className="text-sm font-medium text-gray-800 flex-1 leading-snug">{outcome.text}</p>
            <NSBadge status={outcome.nsStatus} />
          </div>

          <div className="ml-0 pl-16">
            <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">
              Results Committed ({myResults.length})
            </p>
            {myResults.length === 0
              ? <p className="text-sm text-red-500 italic px-2 py-1">⚠ No results committed — cascade gap</p>
              : myResults.map(r => <HResult key={r.id} result={r} />)
            }
            <div className="mt-2 pt-2 border-t border-dashed border-gray-200">
              {!showEval
                ? <button onClick={() => setShowEval(true)} className="text-xs text-indigo-500 hover:text-indigo-700 underline">
                    Evaluate: Are these results N&S for this outcome?
                  </button>
                : <EvalPrompt
                    label={`If ALL ${myResults.length} result${myResults.length !== 1 ? 's' : ''} were produced, would this outcome be UNQUESTIONABLY REALIZED?`}
                    onConfirm={() => save('Confirmed')}
                    onGap={() => save('Gap Detected')}
                    onCancel={() => setShowEval(false)}
                    saving={saving}
                  />
              }
            </div>
          </div>
        </div>
      );
    }

    function HConcern({ concern, idx, allOutcomes, allResults, onUpdate }) {
      const [showEval, setShowEval] = useState(false);
      const [saving, setSaving] = useState(false);
      const c = nsCfg(concern.nsStatus);
      const myOutcomes = allOutcomes.filter(o => o.concernIds.includes(concern.id));

      const save = async (status) => {
        setSaving(true); setShowEval(false);
        await onUpdate('concern', concern.id, status);
        setSaving(false);
      };

      return (
        <div className={`rounded-xl border-2 ${c.border} ${c.bg} p-4 mb-5`}>
          <div className="flex items-start gap-3 mb-4">
            <div className="w-8 h-8 rounded-full bg-gray-900 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">
              C{idx + 1}
            </div>
            <p className="text-base font-semibold text-gray-900 flex-1 leading-snug pt-0.5">{concern.text}</p>
            <NSBadge status={concern.nsStatus} />
          </div>

          <div className="ml-11">
            <p className="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">
              Outcomes fulfilling this concern ({myOutcomes.length})
            </p>
            {myOutcomes.length === 0
              ? <p className="text-sm text-red-500 italic px-2">⚠ No outcomes linked to this concern</p>
              : myOutcomes.map(o => (
                  <HOutcome key={o.id} outcome={o} allResults={allResults} onUpdate={onUpdate} />
                ))
            }
            <div className="mt-3 pt-3 border-t border-dashed border-gray-300">
              {!showEval
                ? <button onClick={() => setShowEval(true)} className="text-sm font-medium text-indigo-600 hover:text-indigo-800 underline">
                    Evaluate: Are these outcomes N&S for this concern?
                  </button>
                : <EvalPrompt
                    label={`If ALL ${myOutcomes.length} outcome${myOutcomes.length !== 1 ? 's' : ''} were realized, would this concern be UNQUESTIONABLY FULFILLED?`}
                    onConfirm={() => save('Confirmed')}
                    onGap={() => save('Gap Detected')}
                    onCancel={() => setShowEval(false)}
                    saving={saving}
                  />
              }
            </div>
          </div>
        </div>
      );
    }

    function HierarchyView({ concerns, outcomes, results, onUpdate }) {
      if (concerns.length === 0) return <EmptyState />;
      return (
        <div>
          {concerns.map((c, i) => (
            <HConcern key={c.id} concern={c} idx={i} allOutcomes={outcomes} allResults={results} onUpdate={onUpdate} />
          ))}
        </div>
      );
    }

    // ── AREA VIEW ─────────────────────────────────────────────────────────────
    function AreaView({ concerns, outcomes, results, conditions, breakdowns, onUpdate }) {
      const [openEval, setOpenEval] = useState(null);
      const [saving, setSaving] = useState(false);

      const save = async (type, id, status) => {
        setSaving(true); setOpenEval(null);
        await onUpdate(type, id, status);
        setSaving(false);
      };

      const isOpen = (type, id) => openEval?.type === type && openEval?.id === id;

      if (concerns.length === 0) return <EmptyState />;

      return (
        <div className="space-y-8">

          {/* ── CONCERNS ── */}
          <section>
            <SectionHeader color="bg-gray-900" title="Concerns" count={concerns.length} />
            <div className="space-y-2">
              {concerns.map((c, i) => {
                const cfg = nsCfg(c.nsStatus);
                return (
                  <div key={c.id} className={`rounded-lg border-l-4 ${cfg.border} ${cfg.bg} p-3`}>
                    <div className="flex items-start gap-2">
                      <span className="w-6 h-6 rounded-full bg-gray-900 text-white flex items-center justify-center text-xs font-bold mt-0.5 flex-shrink-0">
                        {i + 1}
                      </span>
                      <p className="text-sm font-medium text-gray-900 flex-1 leading-snug">{c.text}</p>
                      <div className="flex items-center gap-2 flex-shrink-0 ml-2">
                        <NSBadge status={c.nsStatus} />
                        {!isOpen('concern', c.id) && (
                          <button onClick={() => setOpenEval({ type: 'concern', id: c.id })}
                            className="text-xs text-indigo-500 hover:text-indigo-700 underline">
                            Evaluate
                          </button>
                        )}
                      </div>
                    </div>
                    {isOpen('concern', c.id) && (
                      <div className="mt-2 ml-8">
                        <EvalPrompt
                          label="If ALL outcomes for this concern were realized, would it be UNQUESTIONABLY FULFILLED?"
                          onConfirm={() => save('concern', c.id, 'Confirmed')}
                          onGap={() => save('concern', c.id, 'Gap Detected')}
                          onCancel={() => setOpenEval(null)}
                          saving={saving}
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </section>

          {/* ── OUTCOMES ── */}
          <section>
            <SectionHeader color="bg-indigo-500" title="Outcomes" count={outcomes.length} />
            <div className="space-y-2">
              {outcomes.map((o, i) => {
                const cfg = nsCfg(o.nsStatus);
                const myResults = results.filter(r => r.outcomeId === o.id);
                const cNums = o.concernIds.map(cid => {
                  const idx = concerns.findIndex(c => c.id === cid);
                  return idx >= 0 ? idx + 1 : null;
                }).filter(Boolean);

                return (
                  <div key={o.id} className={`rounded-lg border-l-4 ${cfg.border} ${cfg.bg} p-3`}>
                    <div className="flex items-start gap-2">
                      <span className="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-bold mt-0.5 flex-shrink-0">
                        {i + 1}
                      </span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-gray-900 leading-snug">{o.text}</p>
                        <div className="flex flex-wrap items-center gap-1 mt-1.5">
                          <span className="text-xs text-gray-400">Fulfills:</span>
                          {cNums.length > 0
                            ? cNums.map(n => (
                                <span key={n} className="text-xs bg-gray-800 text-white px-1.5 py-0.5 rounded-full">C{n}</span>
                              ))
                            : <span className="text-xs text-orange-400 italic">no concerns linked</span>
                          }
                          <span className="text-xs text-gray-400 ml-1">
                            · {myResults.length} result{myResults.length !== 1 ? 's' : ''}
                          </span>
                        </div>
                      </div>
                      <div className="flex items-center gap-2 flex-shrink-0 ml-2">
                        <NSBadge status={o.nsStatus} />
                        {!isOpen('outcome', o.id) && (
                          <button onClick={() => setOpenEval({ type: 'outcome', id: o.id })}
                            className="text-xs text-indigo-500 hover:text-indigo-700 underline">
                            Evaluate
                          </button>
                        )}
                      </div>
                    </div>
                    {isOpen('outcome', o.id) && (
                      <div className="mt-2 ml-8">
                        <EvalPrompt
                          label="If ALL results for this outcome were produced, would it be UNQUESTIONABLY REALIZED?"
                          onConfirm={() => save('outcome', o.id, 'Confirmed')}
                          onGap={() => save('outcome', o.id, 'Gap Detected')}
                          onCancel={() => setOpenEval(null)}
                          saving={saving}
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </section>

          {/* ── RESULTS ── */}
          <section>
            <SectionHeader color="bg-emerald-500" title="Results Committed" count={results.length} />
            <div className="space-y-1.5">
              {results.map(r => {
                const outcome = outcomes.find(o => o.id === r.outcomeId);
                return (
                  <div key={r.id} className="flex items-start gap-2 bg-white border border-gray-100 rounded-lg p-2.5 hover:border-gray-200 transition-colors">
                    <span className="text-gray-300 text-xs mt-0.5 flex-shrink-0">▸</span>
                    <span className="text-sm text-gray-700 flex-1 leading-snug">{r.text}</span>
                    <div className="flex items-center gap-2 flex-shrink-0 ml-2">
                      {outcome && (
                        <span className="hidden md:inline text-xs bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded-full truncate max-w-[200px]"
                          title={outcome.text}>
                          → {outcome.text.length > 32 ? outcome.text.substring(0, 32) + '…' : outcome.text}
                        </span>
                      )}
                      <StatusPill status={r.status} />
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* ── CONDITIONS ── */}
          {conditions.length > 0 && (
            <section>
              <SectionHeader color="bg-violet-500" title="Conditions for Satisfaction" count={conditions.length} />
              <div className="space-y-1.5">
                {conditions.map((c, i) => (
                  <div key={c.id} className="flex items-start gap-2 bg-violet-50 border border-violet-200 rounded-lg p-2.5">
                    <span className="text-violet-400 font-bold text-xs mt-0.5 flex-shrink-0">{i + 1}</span>
                    <span className="text-sm text-gray-700 leading-snug">{c.text}</span>
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* ── BREAKDOWNS ── */}
          {breakdowns.length > 0 && (
            <section>
              <SectionHeader color="bg-orange-500" title="Breakdowns Register" count={breakdowns.length} />
              <div className="space-y-2">
                {breakdowns.map(b => (
                  <div key={b.id} className="bg-orange-50 border border-orange-200 rounded-lg p-3">
                    <div className="flex items-start gap-2">
                      <span className="text-orange-500 font-bold text-sm mt-0.5 flex-shrink-0">⚡</span>
                      <div className="flex-1">
                        <p className="text-sm font-medium text-gray-800 leading-snug">{b.text}</p>
                        {b.date && (
                          <p className="text-xs text-gray-400 mt-1">
                            {new Date(b.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
                          </p>
                        )}
                        {b.resolution && (
                          <p className="text-xs text-gray-600 mt-1 italic">
                            <span className="font-semibold not-italic">Resolution:</span> {b.resolution}
                          </p>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          )}
        </div>
      );
    }

    // ── SCORECARD ─────────────────────────────────────────────────────────────
    function Scorecard({ concerns, outcomes }) {
      const cnt = (arr, s) => arr.filter(x => x.nsStatus === s).length;
      const cols = [
        ['Confirmed',    'text-emerald-600'],
        ['Needs Review', 'text-amber-500'],
        ['Gap Detected', 'text-red-500'],
      ];
      const Panel = ({ label, arr }) => (
        <div className="bg-white rounded-xl border border-gray-200 p-3">
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">{label}</p>
          <div className="flex gap-4">
            {cols.map(([s, color]) => (
              <div key={s} className="text-center">
                <div className={`text-xl font-bold ${color}`}>{cnt(arr, s)}</div>
                <div className="text-xs text-gray-400 leading-tight">{s.split(' ')[0]}</div>
              </div>
            ))}
            <div className="text-center">
              <div className="text-xl font-bold text-gray-300">{arr.length}</div>
              <div className="text-xs text-gray-400">Total</div>
            </div>
          </div>
        </div>
      );
      return (
        <div className="grid grid-cols-2 gap-3 mb-5">
          <Panel label="Concerns → Outcomes" arr={concerns} />
          <Panel label="Outcomes → Results"  arr={outcomes}  />
        </div>
      );
    }

    // ── EMPTY STATE ───────────────────────────────────────────────────────────
    function EmptyState() {
      return (
        <div className="text-center py-16 text-gray-400">
          <p className="text-4xl mb-3">🌱</p>
          <p className="font-medium">No data for this area yet.</p>
          <p className="text-sm mt-1">Add concerns and outcomes in the Notion databases.</p>
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [data,     setData]     = useState(null);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [area,     setArea]     = useState(AREAS[0]);
      const [view,     setView]     = useState('hierarchy');
      const [toast,    setToast]    = useState(null);

      useEffect(() => {
        fetch('/api/cascade')
          .then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      const showToast = (msg, ok = true) => {
        setToast({ msg, ok });
        setTimeout(() => setToast(null), 2500);
      };

      const handleUpdate = useCallback(async (type, id, status) => {
        // Optimistic update
        setData(prev => {
          if (!prev) return prev;
          const key = type === 'concern' ? 'concerns' : 'outcomes';
          return { ...prev, [key]: prev[key].map(x => x.id === id ? { ...x, nsStatus: status } : x) };
        });
        // Persist to Notion
        try {
          const r = await fetch('/api/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pageId: id, status }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error);
          showToast(`Saved: ${status}`);
        } catch (e) {
          showToast(`Save failed: ${e.message}`, false);
        }
      }, []);

      if (loading) return (
        <div className="flex items-center justify-center min-h-screen">
          <div className="text-center">
            <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full spin mx-auto mb-3" />
            <p className="text-gray-500 text-sm">Loading your cascade…</p>
          </div>
        </div>
      );

      if (error) return (
        <div className="flex items-center justify-center min-h-screen p-6">
          <div className="bg-red-50 border border-red-200 rounded-xl p-6 max-w-md text-center">
            <p className="text-red-700 font-semibold mb-2">Could not load cascade data</p>
            <p className="text-red-500 text-sm">{error}</p>
            <p className="text-gray-400 text-xs mt-3">Check that NOTION_TOKEN is set and the integration has access to the prototype databases.</p>
          </div>
        </div>
      );

      const { concerns, outcomes, results, conditions, breakdowns } = data;
      const filter  = arr => arr.filter(x => x.area === area);
      const aC = filter(concerns);
      const aO = filter(outcomes);
      const aR = filter(results);
      const aCond = filter(conditions);
      const aBD   = filter(breakdowns);

      const areaShort = a => a.replace(/^[^\s]+ /, '');

      return (
        <div className="max-w-4xl mx-auto p-5 font-sans">

          {/* Header */}
          <div className="mb-5">
            <h1 className="text-xl font-bold text-gray-900">Structure for Fulfillment Cascade</h1>
            <p className="text-gray-400 text-sm mt-0.5">Necessity & Sufficiency Review — Live from Notion</p>
          </div>

          {/* Area selector */}
          <div className="flex gap-1 bg-white border border-gray-200 rounded-xl p-1 mb-3 shadow-sm w-fit">
            {AREAS.map(a => (
              <button key={a} onClick={() => setArea(a)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  area === a ? 'bg-gray-900 text-white shadow-sm' : 'text-gray-500 hover:text-gray-800'
                }`}>
                {a}
              </button>
            ))}
          </div>

          {/* View toggle */}
          <div className="flex gap-1 bg-white border border-gray-200 rounded-xl p-1 mb-5 shadow-sm w-fit">
            <button onClick={() => setView('hierarchy')}
              className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                view === 'hierarchy' ? 'bg-gray-900 text-white shadow-sm' : 'text-gray-500 hover:text-gray-800'
              }`}>
              🌳 Hierarchy View
            </button>
            <button onClick={() => setView('area')}
              className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                view === 'area' ? 'bg-gray-900 text-white shadow-sm' : 'text-gray-500 hover:text-gray-800'
              }`}>
              📋 Area View
            </button>
          </div>

          {/* Scorecard */}
          <Scorecard concerns={aC} outcomes={aO} />

          {/* Main view */}
          {view === 'hierarchy'
            ? <HierarchyView concerns={aC} outcomes={aO} results={aR} onUpdate={handleUpdate} />
            : <AreaView concerns={aC} outcomes={aO} results={aR} conditions={aCond} breakdowns={aBD} onUpdate={handleUpdate} />
          }

          {/* Toast */}
          {toast && (
            <div className={`fixed bottom-5 right-5 px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg transition-all ${
              toast.ok ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'
            }`}>
              {toast.ok ? '✓' : '✗'} {toast.msg}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
